name: CI/CD - fix/docker-auth-login

on:
  push:
    branches:
      - fix/docker-auth-login
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: mini-11
  IMAGE_TAG: ${{ github.sha }}
  APP_NAME: mini-11
  APP_PORT: "3000"

jobs:
  ci:
    name: Build Docker Image and Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}
      image_tag: ${{ env.IMAGE_TAG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        id: image
        working-directory: ./Mini-11
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build \
            --build-arg DATABASE_URL="$DATABASE_URL" \
            --build-arg JWT_SECRET="$JWT_SECRET" \
            -t "$IMAGE_URI" \
            -t "$REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$IMAGE_URI"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Image build summary
        run: |
          echo "Image built and pushed: ${{ steps.image.outputs.image_uri }}"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: ci
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get EC2 instance details from Terraform
        id: tf-outputs
        run: |
          cd terraform/environments/dev
          # Note: You should use terraform output after applying Terraform
          # For now, using secrets as fallback
          echo "ec2_host=${{ secrets.EC2_HOST }}" >> "$GITHUB_OUTPUT"

      - name: Deploy container on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            
            echo "Starting deployment of ${{ needs.ci.outputs.image_uri }}"
            
            # Authenticate with ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin $(echo "${{ needs.ci.outputs.image_uri }}" | cut -d'/' -f1)
            
            # Pull latest image
            docker pull "${{ needs.ci.outputs.image_uri }}"
            
            # Stop and remove old container
            docker stop ${{ env.APP_NAME }} || true
            docker rm ${{ env.APP_NAME }} || true
            
            # Start new container with secrets from environment
            docker run -d \
              --name ${{ env.APP_NAME }} \
              --restart unless-stopped \
              -p 127.0.0.1:${{ env.APP_PORT }}:3000 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e NODE_ENV=production \
              "${{ needs.ci.outputs.image_uri }}"
            
            # Cleanup old images
            docker image prune -af --filter "until=168h"
            
            echo "Container deployed successfully"
            docker ps --filter "name=${{ env.APP_NAME }}"

      - name: Health check
        run: |
          echo "Waiting for application to be healthy..."
          max_attempts=30
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if curl -sf http://${{ secrets.EC2_HOST }}:${{ env.APP_PORT }}/login > /dev/null 2>&1; then
              echo "Application is healthy"
              exit 0
            fi
            echo "Attempt $attempt/$max_attempts: Application not ready yet..."
            sleep 2
            attempt=$((attempt + 1))
          done
          echo "❌ Health check failed after $max_attempts attempts"
          exit 1
