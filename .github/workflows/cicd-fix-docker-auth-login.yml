name: CI/CD - fix/docker-auth-login

on:
  push:
    branches:
      - fix/docker-auth-login
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: mini-11
  IMAGE_TAG: ${{ github.sha }}
  APP_NAME: mini-11
  APP_PORT: "3000"

jobs:
  ci:
    name: Build Docker Image and Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}
      image_tag: ${{ env.IMAGE_TAG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        id: image
        working-directory: .
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build \
            --build-arg DATABASE_URL="$DATABASE_URL" \
            --build-arg JWT_SECRET="$JWT_SECRET" \
            -t "$IMAGE_URI" \
            -t "$REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$IMAGE_URI"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Image build summary
        run: |
          echo "Image built and pushed: ${{ steps.image.outputs.image_uri }}"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: ci
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get EC2 instance details from Terraform
        id: tf-outputs
        run: |
          # Using GitHub secret for EC2 host
          echo "ec2_host=${{ secrets.EC2_HOST }}" >> "$GITHUB_OUTPUT"

      - name: Deploy container on EC2 via SSM
        run: |
          set -euo pipefail

          # Prefer stable instance-id secret; fall back to tag lookup.
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"

          if [ -z "$INSTANCE_ID" ]; then
            INSTANCE_ID=$(aws ec2 describe-instances \
              --region ${{ env.AWS_REGION }} \
              --filters "Name=tag:Name,Values=${{ env.APP_NAME }}-instance" "Name=instance-state-name,Values=running" \
              --query "Reservations[0].Instances[0].InstanceId" \
              --output text)
          fi

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "Could not resolve running EC2 instance (set EC2_INSTANCE_ID secret or ensure Name tag '${{ env.APP_NAME }}-instance')"
            exit 1
          fi

          IMAGE_URI="${{ needs.ci.outputs.image_uri }}"
          REGISTRY="${IMAGE_URI%%/*}"

          cat > commands.json <<EOF
          {
            "commands": [
              "set -euo pipefail",
              "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${REGISTRY}",
              "docker pull ${IMAGE_URI}",
              "docker stop ${{ env.APP_NAME }} || true",
              "docker rm ${{ env.APP_NAME }} || true",
              "docker run -d --name ${{ env.APP_NAME }} --restart unless-stopped -p ${{ env.APP_PORT }}:3000 --env-file /etc/docker/.env -e NODE_ENV=production -e COOKIE_SECURE=false ${IMAGE_URI}",
              "docker image prune -af --filter until=168h",
              "docker ps --filter name=${{ env.APP_NAME }}"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --region ${{ env.AWS_REGION }} \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file://commands.json \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --region ${{ env.AWS_REGION }} \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "Attempt $i/30: status=$STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Deployment succeeded"
              aws ssm get-command-invocation --region ${{ env.AWS_REGION }} --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardOutputContent" --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deployment failed"
              aws ssm get-command-invocation --region ${{ env.AWS_REGION }} --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 10
          done

          echo "Timed out waiting for SSM command"
          exit 1

      - name: Health check
        run: |
          echo "Waiting for application to be healthy..."
          max_attempts=30
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if curl -sf http://${{ secrets.ALB_DNS }}/login > /dev/null 2>&1; then
              echo "Application is healthy"
              exit 0
            fi
            echo "Attempt $attempt/$max_attempts: Application not ready yet..."
            sleep 2
            attempt=$((attempt + 1))
          done
          echo "❌ Health check failed after $max_attempts attempts"
          exit 1
